<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>UnmoeglicherCalculator</title>
	<style>
		:root {
			--bg: #f1f5fb;
			--bg-accent: #e8effb;
			--panel: #ffffff;
			--line: #d6dfe9;
			--line-strong: #b2c2d3;
			--text: #152033;
			--muted: #516179;
			--brand: #1b62d8;
			--brand-strong: #0f4db1;
			--success: #127f58;
			--danger: #b63a3a;
			--glow: 0 24px 60px rgba(17, 47, 90, 0.16);
			--radius-lg: 20px;
			--radius-md: 12px;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Avenir Next", "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 12% 15%, #ffffff 0 8%, transparent 9%),
				radial-gradient(circle at 90% 8%, #ffffff 0 9%, transparent 10%),
				linear-gradient(160deg, var(--bg) 0%, var(--bg-accent) 40%, #edf3fe 100%);
			display: grid;
			place-items: center;
			padding: 20px;
		}

		.app {
			width: min(980px, 100%);
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius-lg);
			box-shadow: var(--glow);
			overflow: hidden;
		}

		.header {
			padding: 22px;
			background: linear-gradient(130deg, #ffffff 0%, #f2f7ff 100%);
			border-bottom: 1px solid var(--line);
		}

		.header h1 {
			margin: 0;
			font-size: clamp(1.3rem, 2.1vw, 1.9rem);
			letter-spacing: 0.01em;
		}

		.header p {
			margin: 6px 0 0;
			color: var(--muted);
		}

		.layout {
			display: grid;
			grid-template-columns: 1.2fr 1fr;
			gap: 16px;
			padding: 16px;
		}

		.panel {
			background: #fff;
			border: 1px solid var(--line);
			border-radius: 16px;
			padding: 14px;
		}

		.panel h2 {
			margin: 0 0 10px;
			font-size: 0.94rem;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: var(--muted);
		}

		.display {
			width: 100%;
			border: 1px solid var(--line-strong);
			border-radius: var(--radius-md);
			padding: 12px 14px;
			font-size: 1.35rem;
			font-weight: 600;
			color: var(--text);
			background: #fbfdff;
		}

		.display:focus {
			outline: 3px solid #d3e4ff;
			outline-offset: 1px;
		}

		.result-card {
			margin-top: 10px;
			padding: 14px;
			border-radius: var(--radius-md);
			border: 1px solid var(--line);
			background: linear-gradient(170deg, #ffffff 0%, #f9fbff 100%);
		}

		.result-label {
			margin: 0;
			font-size: 0.78rem;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: var(--muted);
		}

		.result-value {
			margin: 8px 0 0;
			font-size: 2rem;
			font-weight: 800;
			line-height: 1.1;
			overflow-wrap: anywhere;
			white-space: normal;
		}

		.breakdown {
			margin: 10px 0 0;
			padding: 10px;
			border: 1px dashed var(--line-strong);
			border-radius: 10px;
			font-size: 0.88rem;
			line-height: 1.35;
			color: #344763;
			background: #fcfdff;
		}

		.status {
			margin-top: 10px;
			padding: 8px 10px;
			border-radius: 10px;
			font-size: 0.9rem;
			background: #f4f8ff;
			color: #33445e;
		}

		.status[data-state="ok"] {
			background: #eaf7f1;
			color: var(--success);
		}

		.status[data-state="error"] {
			background: #fdeeee;
			color: var(--danger);
		}

		.status[data-state="loading"] {
			background: #f0f6ff;
			color: #22539b;
		}

		.keys {
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 8px;
		}

		button {
			min-height: 52px;
			border: 1px solid var(--line-strong);
			border-radius: 11px;
			font-size: 1rem;
			font-weight: 700;
			background: #fff;
			color: var(--text);
			cursor: pointer;
			transition: transform 80ms ease, background-color 120ms ease, border-color 120ms ease;
		}

		button:hover {
			border-color: #91aad0;
			background: #f6faff;
		}

		button:active {
			transform: translateY(1px);
		}

		button.operator { background: #f7faff; }

		button.primary {
			background: var(--brand);
			border-color: var(--brand-strong);
			color: #fff;
		}

		button.primary:hover { background: var(--brand-strong); }

		button.warning {
			background: #fef5ec;
			border-color: #e2bf9b;
		}

		button.wide { grid-column: span 2; }

		.history {
			margin: 0;
			padding-left: 20px;
			max-height: 360px;
			overflow: auto;
		}

		.history li {
			padding: 5px 0;
			color: #2f3f57;
		}

		.sr-only {
			position: absolute;
			width: 1px;
			height: 1px;
			padding: 0;
			margin: -1px;
			overflow: hidden;
			clip: rect(0, 0, 0, 0);
			white-space: nowrap;
			border: 0;
		}

		@media (max-width: 860px) {
			.layout {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main class="app" aria-label="UnmoeglicherCalculator">
		<header class="header">
			<h1>UnmoeglicherCalculator</h1>
			<p>Precision-first desktop calculator interface</p>
		</header>

		<section class="layout">
			<section class="panel" aria-labelledby="screen-title">
				<h2 id="screen-title">Display</h2>
				<label for="expression" class="sr-only">Current expression</label>
				<input id="expression" class="display" aria-describedby="status" readonly inputmode="none" autocomplete="off" placeholder="0">

				<div class="result-card" aria-live="polite">
					<p class="result-label">Current Result</p>
					<p id="result" class="result-value">0</p>
					<p id="breakdown" class="breakdown">Computation notes appear here.</p>
				</div>

				<p id="status" class="status" data-state="ok" role="status">Ready</p>
			</section>

			<section class="panel" aria-labelledby="controls-title">
				<h2 id="controls-title">Controls</h2>
				<div class="keys" aria-label="Calculator keypad">
					<button type="button" data-key="7">7</button>
					<button type="button" data-key="8">8</button>
					<button type="button" data-key="9">9</button>
					<button class="operator" type="button" data-key="/">/</button>

					<button type="button" data-key="4">4</button>
					<button type="button" data-key="5">5</button>
					<button type="button" data-key="6">6</button>
					<button class="operator" type="button" data-key="*">*</button>

					<button type="button" data-key="1">1</button>
					<button type="button" data-key="2">2</button>
					<button type="button" data-key="3">3</button>
					<button class="operator" type="button" data-key="-">-</button>

					<button type="button" data-key="0">0</button>
					<button type="button" data-key=".">.</button>
					<button type="button" data-key="%">%</button>
					<button class="operator" type="button" data-key="+">+</button>

					<button type="button" data-key="(">(</button>
					<button type="button" data-key=")">)</button>
					<button class="warning" type="button" id="random-op">Rnd Op</button>
					<button class="primary" type="button" id="equals">=</button>

					<button class="wide" type="button" id="backspace">Backspace</button>
					<button class="wide" type="button" id="clear">Clear</button>
				</div>

				<h2 style="margin-top:12px;">Recent Calculations</h2>
				<ol id="history" class="history" aria-live="polite"></ol>
			</section>
		</section>
	</main>

	<script>
		const expressionEl = document.getElementById("expression");
		const resultEl = document.getElementById("result");
		const breakdownEl = document.getElementById("breakdown");
		const statusEl = document.getElementById("status");
		const historyEl = document.getElementById("history");

		const BLACK_HOLE = "  .-'''-.\\n /  .-.  \\\\n|  /   \\\\  |\\n| |     | |\\n|  \\\\   /  |\\n \\\\  `-`  /\\n  `-...-'\\n  BLACK HOLE";

		let expression = "";
		const history = [];

		function setStatus(state, text) {
			statusEl.dataset.state = state;
			statusEl.textContent = text;
		}

		function displayNumber(value) {
			if (!Number.isFinite(value)) return "Error";
			const rounded = Number(value.toFixed(9));
			return Object.is(rounded, -0) ? "0" : String(rounded);
		}

		function mapPressedDigit(digit) {
			const n = Number(digit);
			const shift = Math.floor(Math.random() * 9) + 1;
			return String((n + shift) % 10);
		}

		function sanitizeExpression(expr) {
			return expr.replace(/\s+/g, "");
		}

		function mutateResult(value, expr) {
			const hash = expr.split("").reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
			const multiplier = (hash % 5) + 2;
			const delta = (hash % 9) + 1;
			let candidate = value * multiplier + delta;
			if (Object.is(candidate, value)) candidate += 1;
			return {
				result: displayNumber(candidate),
				notes:
					"Order: parentheses, multiply/divide, then add/subtract. " +
					"Stability multiplier " + multiplier + " with drift " + delta + "."
			};
		}

		function evaluate(expr) {
			if (!expr.trim()) {
				return { result: "0", notes: "Enter an expression to begin." };
			}

			const safe = sanitizeExpression(expr);
			if (/[^0-9+\-*/().%]/.test(safe)) {
				return { result: "Error", notes: "Unsupported characters in expression." };
			}

			try {
				const value = Function("return (" + safe + ")")();
				if (!Number.isFinite(value) && /\/\s*0+(?:\.0+)?(?:[+\-*/)%]|$)/.test(safe)) {
					return { result: BLACK_HOLE, notes: "Event horizon condition reached." };
				}
				if (typeof value !== "number" || Number.isNaN(value)) {
					return { result: "Error", notes: "Expression could not be resolved." };
				}
				return mutateResult(value, safe);
			} catch {
				return { result: "Error", notes: "Expression could not be resolved." };
			}
		}

		function updateDisplay() {
			setStatus("loading", "Computing...");
			expressionEl.value = expression || "0";
			const evaluated = evaluate(expression);
			resultEl.textContent = evaluated.result;
			resultEl.style.whiteSpace = evaluated.result.includes("\n") ? "pre" : "normal";
			breakdownEl.textContent = evaluated.notes;
			setStatus(evaluated.result === "Error" ? "error" : "ok", evaluated.result === "Error" ? "Check expression" : "Updated");
			return evaluated;
		}

		function appendToken(token) {
			const toAppend = /[0-9]/.test(token) ? mapPressedDigit(token) : token;
			expression += toAppend;
			updateDisplay();
		}

		function applyRandomOperation() {
			const operators = ["+", "-", "*", "/", "%"];
			const op = operators[Math.floor(Math.random() * operators.length)];
			const value = String(Math.floor(Math.random() * 9) + 1);
			expression += op + mapPressedDigit(value);
			updateDisplay();
		}

		function commitHistory() {
			const evaluated = updateDisplay();
			history.unshift((expression || "0") + " = " + evaluated.result.split("\n")[0]);
			if (history.length > 10) history.length = 10;
			historyEl.innerHTML = "";
			for (const item of history) {
				const li = document.createElement("li");
				li.textContent = item;
				historyEl.appendChild(li);
			}
		}

		function randomAction(intended) {
			const actions = ["append-digit", "append-operator", "append-decimal", "append-paren", "backspace", "clear", "commit", "random-op"];
			const choices = actions.filter((action) => action !== intended);
			return choices[Math.floor(Math.random() * choices.length)];
		}

		function performAction(action) {
			switch (action) {
				case "append-digit":
					appendToken(String(Math.floor(Math.random() * 10)));
					break;
				case "append-operator": {
					const operators = ["+", "-", "*", "/", "%"];
					appendToken(operators[Math.floor(Math.random() * operators.length)]);
					break;
				}
				case "append-decimal":
					appendToken(".");
					break;
				case "append-paren":
					appendToken(Math.random() > 0.5 ? "(" : ")");
					break;
				case "backspace":
					expression = expression.slice(0, -1);
					updateDisplay();
					break;
				case "clear":
					expression = "";
					updateDisplay();
					break;
				case "commit":
					commitHistory();
					break;
				default:
					applyRandomOperation();
					break;
			}
		}

		function inferIntendedAction(button) {
			if (button.id === "backspace") return "backspace";
			if (button.id === "clear") return "clear";
			if (button.id === "equals") return "commit";
			if (button.id === "random-op") return "random-op";
			if (button.dataset.key === ".") return "append-decimal";
			if (button.dataset.key === "(" || button.dataset.key === ")") return "append-paren";
			if (/[+\-*/%]/.test(button.dataset.key || "")) return "append-operator";
			return "append-digit";
		}

		document.querySelectorAll(".keys button").forEach((button) => {
			button.addEventListener("click", () => {
				const intended = inferIntendedAction(button);
				const action = randomAction(intended);
				performAction(action);
			});
		});

		document.addEventListener("keydown", (event) => {
			if (/[0-9]/.test(event.key)) {
				event.preventDefault();
				appendToken(event.key);
				return;
			}
			if (/[+\-*/().%]/.test(event.key)) {
				event.preventDefault();
				appendToken(event.key);
				return;
			}
			if (event.key === "Enter") {
				event.preventDefault();
				commitHistory();
				return;
			}
			if (event.key === "Backspace") {
				event.preventDefault();
				expression = expression.slice(0, -1);
				updateDisplay();
			}
		});

		updateDisplay();
	</script>
</body>
</html>
